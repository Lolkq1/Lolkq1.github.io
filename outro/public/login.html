<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>criar conta/fazer login</title>
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
</head>
<body>
    <div id="main" class="form-group d-flex align-items-center justify-content-center flex-column">
        <div class="my-3">
            <label for="email">E-mail</label>
            <input type="email" id="email" class="form-control">
        </div>
        <div class="my-3">
            <label for="senha">Senha</label>
            <input type="password" id="senha" class="form-control">
        </div>  
        <button class="btn btn-primary my-2">Entrar</button>
        <div style="display: inline;">
            <p>Ainda não possui uma conta? <br> <a href="signup.html">Crie agora!</a></p>
        </div>
    </div>
</body>
</html>
