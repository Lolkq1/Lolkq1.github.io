<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>criar conta/fazer login</title>
    <link rel="stylesheet" href="style3.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <script src="script2.js" defer></script>
</head>
<body>
    <div id="main" class="form-group d-flex align-items-center justify-content-center flex-column">
        <div class="my-1">
            <label for="nome">Nome de usuário</label>
            <input type="text" id="nome" class="form-control">
        </div>
        <div class="my-2">
            <label for="email">Email</label>
            <input type="email" id="email" class="form-control">
        </div>
        <div class="my-1">
            <label for="senha">Senha</label>
            <input type="password" id="senha" class="form-control">
        </div>  
        <button class="btn btn-primary my-2" id="btn">Criar conta</button>
        <div class="my-2">
            <p>Já possui uma conta?<br><a href="login.html">Entre aqui!</a></p>
        </div>
    </div>

</body>
</html>
