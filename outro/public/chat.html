<body>
    <nav class="d-flex justify-content-between" style="width: 100%; height: 75px; margin: 0 0 auto; background-color: rgb(0, 110, 184);">

    <div class="container m-0 p-0 d-flex">
        <div id="sidebar" class="container col-3 m-0">
        </div>
    <div class="container col-9 m-0 p-0" id="pesquisa" style="border: 1px solid black;">
        <div id="chat" class="w-100 h-100 m-0 p-0">
            <div class="navbar w-100 m-0 py-0 px-2" style="height: 50px; background-color: rgb(202, 202, 202);">
                <div>
                    <a href="http://localhost:8080/" style="text-decoration: none;">
                      <img src="https://www.svgrepo.com/show/18507/back-button.svg" style="height: 40px; width: 40px; margin-right: 10px;" alt="">
                    </a>
                    <img src="/chat/public/pfp.png" alt="" style="height: 40px; width: 40px; display: inline; border-radius: 100%;">
                    <p style="display: inline;" class="other" id="quem">eae</p>
                </div>
                
            </div>
            <div id="token" class="w-100" style="height: 80%;">
                
            </div>
            <div class="d-flex align-items-center" id="msg">
                <span class="border border-2"></span>
                <input id="txt" class="form-control w-75" type="text" placeholder="diga aii">
                <button class="btn btn-primary m-2" id="btn_send">enviar</button>
            </div>
        </div>
    </div>
    </div>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script>
        const chats = document.querySelector("#sidebar")
        fetch('/chats').then(res => res.text()).then(res2 => JSON.parse(res2)).then(obj => {
            // <div class="card" style="width: 100%; height: 70px;">
            //     <div class="card-body p-0" style="width: 100%; height: 100%;">
            //         <img src="pfp.png" alt="" class="card-image m-3" style="width: 40px; height: 40px; border-radius: 100%; box-shadow: 0 0 2px; display: inline;">
            //         <p class="card-text" style="display: inline;">pateta 1</p>
            //     </div>
            // </div>
            for (x of obj) {
                console.log(x)
                let card = document.createElement('div')
                card.className = 'card my-1'
                card.style = 'width:100%; height:70px;'
                let cbody = document.createElement('div')
                card.appendChild(cbody)
                cbody.className = 'card-body p-0'
                cbody.style = 'width:100%; height: 100%;'
                let img = document.createElement('img')
                img.src = '/chat/public/pfp.png'
                img.className = 'card-image m-3'
                img.style = 'width: 40px; height: 40px; border-radius: 100%; box-shadow: 0 0 2px; display: inline;'
                cbody.appendChild(img)
                let a = document.createElement('a')
                a.className = 'card-text'
                a.style = 'display:inline; text-decoration:none;'
                a.href = '/chat/'+x.token
                a.textContent = x.nome
                cbody.appendChild(a)
                chats.appendChild(card)
                card.id = x.token
            }
        })
        const socket = io()
        fetch('/socket', {
            method: 'PATCH'
        }).then(res => {
            if (res.ok) {
                res.text().then(obj => JSON.parse(obj)).then(obj2 => socket.emit('novo', obj2))
            } else {
                alert('erro: socket')
                document.location.href = '/'
            }
            })
        const a = document.location.toString().indexOf('chat/')+5
        const b = document.location.toString().slice(a)
        const btn = document.querySelector("#btn_send")
        const txt = document.querySelector("#txt")
        const quem = document.querySelector("#quem")
        fetch(`/chats2/${b}`).then(res => {
            if (res.ok) {
                let a = 0
                fetch(`/historico/${b}`).then(res => {
                    if (res.ok) {
                        res.text().then(res2 => JSON.parse(res2)).then(obj => {                    
                                for (x of obj) {
                                if(x.eu === true) {
                                    let a3 = document.createElement("img")
                                    let b3 = document.createElement("p")
                                    let c3 = document.createElement("div")
                                    let e = document.createElement("div")
                                    let d = document.querySelector('#token')
                                    e.className = 'px-5 py-1 w-100'
                                    e.style = 'text-align: right;'
                                    e.appendChild(b3)
                                    c3.className = 'm-2'
                                    a3.style = 'height: 40px; width: 40px; display: inline; border-radius: 100%; position: relative; left: 100%; transform:translate(-100%,0);'
                                    a3.src = '/chat/public/pfp.png'
                                    b3.textContent = x.msg
                                    b3.style.display = 'inline'
                                    c3.appendChild(a3)
                                    c3.appendChild(e)
                                    d.appendChild(c3)
                                    d.scroll({top:a+100})
                                    a+=100
                                } else {
                                    let a3 = document.createElement("img")
                                    let b3 = document.createElement("p")
                                    let c3 = document.createElement("div")
                                    let e = document.createElement("div")
                                    let d = document.querySelector('#token')
                                    e.className = 'px-5 py-1 w-100'
                                    e.appendChild(b3)
                                    c3.className = 'm-2'
                                    a3.style = 'height: 40px; width: 40px; display: inline; border-radius: 100%;'
                                    a3.src = '/chat/public/pfp.png'
                                    b3.textContent = x.msg
                                    b3.style.display = 'inline'
                                    c3.appendChild(a3)
                                    c3.appendChild(e)
                                    d.appendChild(c3)
                                    d.scroll({top:a+100})
                                    a+=100
                                }
                                
                            }
                            })
                            
                        
                    }
                })
                btn.addEventListener("click", () => {
                    if (txt.value && txt.value.length > 0) {
                        fetch(`/mensagem/${b}`, {
                        method: 'POST',
                        body: JSON.stringify({
                            chat_token: b,
                            msg: txt.value
                        }),
                        headers: {"content-type": "application/json"}
                    }).then(res => {
                        if (res.ok) {
                            res.text().then(text => 
                                    JSON.parse(text)).then(obj => {
                                        console.log(obj)
                                        socket.emit('mensagem', {msg: txt.value, room: b, emissor: obj.sessao})
                                        txt.value = ''
                                        let a3 = document.createElement("img")
                                        let b3 = document.createElement("p")
                                        let c3 = document.createElement("div")
                                        let e = document.createElement("div")
                                        let d = document.querySelector('#token')
                                        e.className = 'px-5 py-1 w-100'
                                        e.style = 'text-align: right;'
                                        e.appendChild(b3)
                                        c3.className = 'm-2'
                                        a3.style = 'height: 40px; width: 40px; display: inline; border-radius: 100%; position: relative; left: 100%; transform:translate(-100%,0);'
                                        a3.src = '/chat/public/pfp.png'
                                        b3.textContent = obj.msg
                                        b3.style.display = 'inline'
                                        c3.appendChild(a3)
                                        c3.appendChild(e)
                                        d.appendChild(c3)
                                        d.scroll({top:a+100})
                                        a+=100
                                    })
                        } else {
                            alert('nao foi possível enviar a mensagem.')
                        }
                    })
                    }
                })
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        if (txt.value && txt.value.length > 0) {
                        fetch(`/mensagem/${b}`, {
                        method: 'POST',
                        body: JSON.stringify({
                            chat_token: b,
                            msg: txt.value
                        }),
                        headers: {"content-type": "application/json"}
                    }).then(res => {
                        if (res.ok) {
                            res.text().then(text => 
                                    JSON.parse(text)).then(obj => {
                                        console.log(obj)
                                        socket.emit('mensagem', {msg: txt.value, room: b, emissor: obj.sessao})
                                        txt.value = ''
                                        let a3 = document.createElement("img")
                                        let b3 = document.createElement("p")
                                        let c3 = document.createElement("div")
                                        let e = document.createElement("div")
                                        let d = document.querySelector('#token')
                                        e.className = 'px-5 py-1 w-100'
                                        e.style = 'text-align: right;'
                                        e.appendChild(b3)
                                        c3.className = 'm-2'
                                        a3.style = 'height: 40px; width: 40px; display: inline; border-radius: 100%; position: relative; left: 100%; transform:translate(-100%,0);'
                                        a3.src = '/chat/public/pfp.png'
                                        b3.textContent = obj.msg
                                        b3.style.display = 'inline'
                                        c3.appendChild(a3)
                                        c3.appendChild(e)
                                        d.appendChild(c3)
                                        d.scroll({top:a+100})
                                        a+=100
                                    })
                        } else {
                            alert('nao foi possível enviar a mensagem.')
                        }
                    })
                    }
                    }
                })
                socket.on('mensagem', (mensagem) => {
                        if (!mensagem.emissor) {
                            return alert('emissao inválida de mensagem.')
                        } else {
                            let a = fetch(`/verificacao_ec2?emissor=${mensagem.emissor}&room=${mensagem.room}`).then(res => {if (!res.ok) {
                                return alert(res.statusText)
                            }
                        })
                    }
                    if (mensagem.room === b) {
                        // processo de carregamento visual da msg
                                let a3 = document.createElement("img")
                                let b3 = document.createElement("p")
                                let c3 = document.createElement("div")
                                let e = document.createElement("div")
                                let d = document.querySelector('#token')
                                e.className = 'px-5 py-1 w-100'
                                e.appendChild(b3)
                                c3.className = 'm-2'
                                a3.style = 'height: 40px; width: 40px; display: inline; border-radius: 100%;'
                                a3.src = '/chat/public/pfp.png'
                                b3.textContent = mensagem.msg
                                b3.style.display = 'inline'
                                c3.appendChild(a3)
                                c3.appendChild(e)
                                d.appendChild(c3)
                                d.scroll({top:a+100})
                                a+=100
                    } else {
                        // processo de carregar notificaçao da msg visualmente.
                        let a2 = document.querySelector(`#${b}_not`)
                        if (a2) {
                            a.textContent = parseInt(a.textContent)++
                        } else {
                            let a = document.createElement('span')
                        a.style = 'width:20px; height:20px; position:absolute; left:100%; transform: translate(-100%); background-color: red; border-radius: 100%; font-size: 20px; color: white;'
                        a.textContent = 1
                        a.id = `${b}_not`
                        }
                        
                    }
   
                })
            } else {
                alert('a conversa não existe ou você não participa dela.')
                document.location.href = '/'
            }
        })
    </script>
</body>
