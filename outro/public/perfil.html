<!DOCTYPE html>
<html lang="en" style="min-height: 100vh;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blablalba</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
</head>
<body style="min-height: 100vh;">
    <div class="container" style="min-height: 100vh;">
        <div class="card" style="min-height: 100vh;">
            <div class="card-body d-flex">
                    <div class="col-3">
                    <img class="card-img" style="border-radius: 100%; box-shadow: 0 0 5px rgb(0, 0, 0); width: 150px; height: 150px;" src="public/pfp.png" alt="">
                </div>
                <div class="col-9">
                    <h1 id="username">nome de usuário</h1>
                    <p id="descricao">lorem ipsum dolor sit amet</p>
                    <button class="btn btn-primary">Enviar mensagem</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const btn = document.querySelector("#btn")
        const id = window.location.pathname.slice([window.location.pathname.indexOf('id')]).split('=')
        if (Number.isNaN(id)) {
            document.location.href = '/'
        } else {
            fetch(`/pesquisa?chave=id&id=${id}`).then(res => {
            if (res.ok) {
                res.text().then(obj2 => JSON.parse(obj2)).then(obj => {
                    console.log(obj)
                    const nome = document.querySelector("#username")
                    const bio = document.querySelector("#descricao")
                    nome.textContent = obj.nome
                    bio.textContent = obj.bio
                })
            }
        })
        }

    </script>
</body>
</html>
